<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WDD 131 Dynamic Web Fundamentals</title>
    <link rel="stylesheet" href="style.css">
    <script src="java.js" defer></script>
    <link rel="icon" href="https://i.ibb.co/27jh7xtt/010-60d42edb-original.gif">
  </head>
  <body>
    <main class="form">
    <h1>Event Ticket</h1>
    <form id="ticketForm">
        <div class="field">
            <label for="firstName">First Name</label>
            <input type="text" id="firstName" required>
        </div>
        <div class="field">
            <label for="lastName">Last Name</label>
            <input type="text" id="lastName" required>
        </div>
        <div class="field full">
            <label for="email">Email</label>
            <input type="email" id="email" required >
        </div>
        <div class="field">
            <label for="type">Type</label>
            <select id="type" required>
                <option value="">Choose one</option>
                <option value="Student">Student</option>
                <option value="Guest">Guest</option>
            </select>
        </div>
        <div class="field">
            <label for="eventDate">Event Date</label>
            <input type="date" id="eventDate" required>
        </div>
        <div id="extraField" class="field full" hidden>
            <label id="extraLabel"></label>
            <input type="text"id="extraInput">
        </div>
        <button class="full" type="submit"> Create Ticket</button>
    </form>
    <section id="errors"></section>
    <section id="ticketOutput"></section>
</main>
  </body>
</html>
