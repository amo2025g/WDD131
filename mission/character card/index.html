<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WDD 131 Dynamic Web Fundamentals</title>
    <link rel="stylesheet" href="style.css">
    <script src="javascript.js" defer></script>
  </head>
  <body>
    <div class="card">
      <img class="image" src="https://andejuli.github.io/wdd131/character_card/snortleblat.webp">
      <p class="name"><span>Snortleblat</span></p>
      <div class="stats">
        <p id="cardClass">Class: Swamp Beast Diplomat</p>
        <p id="cardLevel">Level: 5</p>
        <p id="cardHealth">Health: 100</p>
      </div>
      <div class="buttons">
        <button id="cardAttack">Attacked</button>
        <button id="cardLevelUp">Level Up</button>
      </div>
    </div>
  </body>
